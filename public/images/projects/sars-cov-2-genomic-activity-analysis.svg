  <!-- stacked lineage streams -->
  <path d="M0 760 C 200 700, 350 780, 550 720 S 900 640, 1100 700 S 1400 760, 1600 700 L1600 1000 L0 1000 Z" fill="#c7d0c8" opacity="0.9"/>
  <path d="M0 820 C 220 780, 380 850, 600 800 S 950 730, 1150 790 S 1420 840, 1600 800 L1600 1000 L0 1000 Z" fill="#9fae9f" opacity="0.9"/>
